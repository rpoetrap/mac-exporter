name: update-tap

on:
  release:
    types: [published]

jobs:
  update-tap:
    runs-on: ubuntu-latest

    steps:
      - name: Compute asset URL and SHA256
        id: asset
        run: |
          VERSION="${GITHUB_REF_NAME}"
          URL="https://github.com/rpoetrap/mac-exporter/releases/download/${VERSION}/mac-exporter_Darwin_arm64.tar.gz"
          SHA256=$(curl -sL "$URL" | sha256sum | awk '{print $1}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Clone tap and update formula
        env:
          HOMEBREW_PAT: ${{ secrets.HOMEBREW_PAT }}
        run: |
          git clone "https://x-access-token:${HOMEBREW_PAT}@github.com/rpoetrap/homebrew-tap.git"
          cd homebrew-tap

          sed -i "s|url \".*\"|url \"${{ steps.asset.outputs.url }}\"|" Formula/mac-exporter.rb
          sed -i "s|sha256 \".*\"|sha256 \"${{ steps.asset.outputs.sha256 }}\"|" Formula/mac-exporter.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/mac-exporter.rb
          git commit -m "Update mac-exporter to ${{ steps.asset.outputs.version }}"
          git push
